<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Amanda and Chris's Secure Web App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="main-container">
    <div class="card-box">

        <h1 class="title text-center mb-4">Create an Account</h1>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       pattern="^[a-zA-Z0-9_]{3,20}$"
                       title="3-20 characters, letters, numbers, and underscores only"
                       required>
                <div class="form-text">
                    3–20 characters. Letters, numbers, and underscores only.
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email"
                       id="email"
                       name="email"
                       class="form-control"
                       required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       minlength="12"
                       required>
                <div class="form-text">
                    Minimum 12 characters. Must include uppercase, lowercase, number, and special character.
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password"
                       id="confirm_password"
                       name="confirm_password"
                       class="form-control"
                       required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100 mt-2">
                Register
            </button>
        </form>

        <!-- Login link -->
        <div class="text-center mt-3">
            <a href="/login" class="register-link">
                Already have an account? Log in
            </a>
        </div>

    </div>
</div>

<!-- Password match script -->
<script>
    const password = document.getElementById("password");
    const confirm_password = document.getElementById("confirm_password");

    function validatePassword() {
        if (password.value !== confirm_password.value) {
            confirm_password.setCustomValidity("Passwords do not match");
        } else {
            confirm_password.setCustomValidity('');
        }
    }

    password.onchange = validatePassword;
    confirm_password.onkeyup = validatePassword;
</script>

</body>
</html>
